# ─────────────────────────────────────────────
# EVIDENCIAS FÍSICAS
# ─────────────────────────────────────────────

items:

  - name: F1 / Acuerdo del Fideicomiso
    type: evidence_physical
    source: design/levels/el_agave_y_la_luna.md
    attributes:
      ubicacion: reservado privado de Barry, Zona 2
      como_se_obtiene: press-X en mesa bajo el vaso de bourbon
      status: BUENA
      implica_a: Barry (móvil)
      requerido_para_confesion: true
    referenced_by:
      - design/gdd/gdd_detective_noir_vr.md
      - design/narrative/cast-bible.md

  - name: F2 / Llave Maestra
    type: evidence_physical
    source: design/levels/el_agave_y_la_luna.md
    attributes:
      ubicacion: guardarropa Zona 1, saco #14
      como_se_obtiene: cadena 5 pasos — cenicero → talón → abrigo #14 → revisar bolsillos → F2
      status: BUENA
      implica_a: Barry (acceso a la oficina)
      requerido_para_confesion: true
    referenced_by:
      - design/gdd/gdd_detective_noir_vr.md
      - design/narrative/cast-bible.md

  - name: F3 / Encendedor de Oro
    type: evidence_physical
    source: design/gdd/gdd_detective_noir_vr.md
    revised: 2026-04-22
    # was: Mancha de pólvora visible bajo UV wand (antes de v0.3)
    attributes:
      ubicacion: suelo Zona 5 (oficina de Cornelius), junto al escritorio
      como_se_obtiene: press-X en suelo Zona 5 → inventario como "dueño desconocido"; confirmado como de Barry al mostrárselo a Moni
      testigo_clave: Moni Graná Fert (la única que lo reconoce)
      status: BUENA
      implica_a: Barry (lo ubica en la escena del crimen)
      requerido_para_confesion: true
    referenced_by:
      - design/narrative/cast-bible.md
      - design/levels/el_agave_y_la_luna.md

  - name: F4 / Maleta de Moni
    type: evidence_physical
    source: design/levels/el_agave_y_la_luna.md
    attributes:
      ubicacion: Zona 3, bodega, detrás de sacos de harina
      status: MALA (red herring)
      implica_a: Moni (plan de escape, no crimen)
    referenced_by:
      - design/gdd/gdd_detective_noir_vr.md

  - name: F5 / Sobre Quemado
    type: evidence_physical
    source: design/levels/el_agave_y_la_luna.md
    attributes:
      ubicacion: baño de empleados, Zona 3
      status: MALA (red herring)
      implica_a: Lola (documentos de demanda civil)
    referenced_by:
      - design/gdd/gdd_detective_noir_vr.md

