# ─────────────────────────────────────────────
# SISTEMAS / CONSTANTES
# ─────────────────────────────────────────────

constants:

  - name: confesion_gate
    source: design/levels/el_agave_y_la_luna.md
    value: "F1+F2+F3 marcados GOOD en inventario + Barry nombrado como acusado"
    nota: "F1=acuerdo fideicomiso, F2=llave maestra, F3=encendedor de oro identificado por Moni"

  - name: inventory_slots
    source: design/levels/el_agave_y_la_luna.md
    value: 8
    unit: slots para evidencia física
    safe_range: "6–10"

  - name: anti_stall_L1
    source: design/levels/el_agave_y_la_luna.md
    value: 4
    unit: minutos sin adquisición

  - name: anti_stall_L2
    source: design/levels/el_agave_y_la_luna.md
    value: 5
    unit: minutos sin adquisición

  - name: anti_stall_L3
    source: design/levels/el_agave_y_la_luna.md
    value: 7
    unit: minutos sin adquisición

  - name: llm_timeout
    source: design/levels/el_agave_y_la_luna.md
    value: 8
    unit: segundos
    nota: "timeout de respuesta LLM por NPC; pipeline STT→LLM <5s end-to-end"

  - name: stt_latency_budget
    source: design/gdd/gdd_detective_noir_vr.md
    value: 4
    unit: segundos end-to-end
    nota: "sin TTS — balbuceo es local e instantáneo"
